<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta content="ie=edge" http-equiv="X-UA-Compatible" />
    <title>Around The U.S.</title>
    <link rel="stylesheet" href="./pages/index.css" />
  </head>
  <body class="page">
    <header class="header page__section">
        <img
          alt="Logotipo Around The U.S."
          class="logo header__logo"
          src="./images/logo.svg"
        />
    </header >
    <main class="content">
      <section class="profile page__section">
          <div class="profile__avatar-container">
          <h1 class="profile__title">Jacques Cousteau</h1>
            <button
              aria-label="Editar descripcion"
              class="profile__edit-button"
              type="button"
            ></button>
            <p class="profile__description">Explorador</p>
            <img
            class="profile__image"
            src="./images/avatar.jpg"
            alt="Avatar"  />
            <button class="profile__edit-button">Editar</button>
          </div>

          <div class="popup" id="avatar-popup">
            <button
              aria-label="Editar avatar"
              class="profile__edit-button"
              type="button"
            ></button>
            <button
              aria-label="Cerrar ventana emergente"
              class="profile__add-button"
              type="button"></button>
            <!-- <div class="profile__avatar-overlay"></div> -->
          </div>
          </div>

          <section class="cards">

          </div>
          <button
            aria-label="Agregar tarjeta"
            class="profile__add-button"
            type="button"
          ></button>
        </section>

        <section class="cards page__section">
          <ul class="cards__list">
            <template id="card__template">
              <li class="card">
                <img class="card__image" src="" alt="" />
                <button
                  aria-label="Elimiinar tarjeta"
                  class="card__delete-button"
                  type="button"
                ></button>
                <div class="card__description">
                  <h2 class="card__title"></h2>
                  <button
                    aria-label="Boton Me gusta"
                    class="card__like-button"
                    type="button"
                  ></button>
                </div>
              </li>
            </template>
          </ul>
        </section>
      </main>

      <footer class="footer page__section">
        <p class="footer__copyright">© 2026 Around The U.S.</p>
      </footer>

      <div class="popup" id="edit-popup">
        <div class="popup__content">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close"
            type="button"
          ></button>
          <h3 class="popup__title">Editar perfil</h3>
          <form class="popup__form" id="edit-profile-form">
            <input
              class="popup__input popup__input_type_name"
              name="name"
              placeholder="Nombre"
              type="text"
              required
              minlength="2"
              maxlength="40"
            />
            <span class="popup__error popup__error_type_name"></span>

            <input
              class="popup__input popup__input_type_description"
              name="description"
              placeholder="Acerca de mí"
              type="text"
              required
              minlength="2"
              maxlength="200"
            />
            <span class="popup__error popup__error_type_description"></span>

            <button class="button popup__button" type="submit" disabled>
              Guardar
            </button>
          </form>
        </div>
      </div>

      <div class="popup" id="new-card-popup">
        <div class="popup__content">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close"
            type="button"
          ></button>
          <h3 class="popup__title">Nuevo lugar</h3>
          <form class="popup__form" id="new-card-form" novalidate>
            <input
              id="place-name"
              class="popup__input popup__input_type_card-name"
              name="place-name"
              placeholder="Título"
              required
              type="text"
              minlength="2"
              maxlength="200"
            />
            <span
              class="popup__error popup__error_type_place-name"
              id="place-name-error"
            ></span>

            <input
              id="link"
              class="popup__input popup__input_type_url"
              name="link"
              placeholder="Enlace a la imagen"
              required
              type="url"
            />
            <span
              class="popup__error popup__error_type_link"
              id="link-error"
            ></span>

            <button
              class="button popup__button popup__button_disabled"
              type="submit"
              disabled
            >
              Crear
            </button>
          </form>
        </div>
      </div>
      <div class="popup" id="image-popup">
        <div class="popup__content popup__content_content_image">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close"
            type="button"
          ></button>
          <img alt="" class="popup__image" src="#" />
          <p class="popup__caption"></p>
        </div>
      </div>
      <div class="popup" id="edit-avatar-popup">
        <div class="popup__content">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close"
            type="button"
          ></button>
          <h3 class="popup__title">Editar avatar</h3>
          <form class="popup__form" id="edit-avatar-form">
            <input
              class="popup__input popup__input_type_name"
              name="avatar"
              placeholder="avatar"
              type="url"
              required
            />
            <span class="popup__error popup__error_type_avatar"></span>
            />

            <button class="button popup__button" type="submit" disabled>
              Guardar
            </button>
          </form>
        </div>
      </div>
    </div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
