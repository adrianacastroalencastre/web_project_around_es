<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta content="ie=edge" http-equiv="X-UA-Compatible" />
    <title>Around The U.S.</title>
    <link href="./pages/index.css" rel="stylesheet" />
  </head>
  <body class="page">
    <div class="page__content">
      <header class="header page__section">
        <img
          alt="Logotipo Around The U.S."
          class="logo header__logo"
          src="./images/logo.svg"
        />
      </header>
      <main class="content">
        // Perfil de Usuario
        <section class="profile page__section">
          <div class="profile__image-container">
            <img class="profile__image" src="./images/avatar.jpg" alt="Foto de Perfil">
            <div class="profile__image-overlay">
            </div>
            <div class="profile__info">
               <h1 class="profile__title">Jacques Cousteau</h1>
               <p class="profile__description">Explorador</p>            
               <button
                aria-label="Editar perfil"
                class="profile__edit-button"
                type="button"
              ></button>
            </div>
            <button
            aria-label="boton" 
            class="profile__add-button" 
            type="button">
            </button>
          </section>
        // Galeria Tarjetas  
        <section class="cards page__section">
          <ul  
          class="cards__list"
          id="cards-list">
          </ul>
        </section>>
      </main>
      // Template Plantilla de tarjetas 
      <template id="card-template">
        <li class="card">
          <img class="card__image" src="./images/placeholder.jpg" alt="" />
          <div>
          <h2 class="card__title"></h2>
          <button
          aria-label="Eliminar tarjeta"
          class="card__like-button"
          type="button"
          ></button>
          </div>
          <button
          aria-label="Botón Me gusta"
          class="card__delete-button"
          type="button"
          ></button>
        </li>
      </template>
      <footer class="footer page__section">
      <p class="footer__copyright">© 2026 Around The U.S.</p>
      </footer>
    </div>
    //Los POPUPS - ventanas emergentes
    <div class="popup" id="edit-popup">
        <div class="popup__container">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close-button"
            type="button"
          ></button>
          <h3 class="popup__title">Editar perfil</h3>
          <form class="popup__form" id="edit-profile-form">
            <input
              class="popup__input popup__input_type_name"
              id="name"
              name="name"
              placeholder="Nombre"
              type="text"
              minlength="2"
              maxlength="40"
              required
            />
            <span
              class="popup__error popup__error_type_name"
              id="name-error"
            ></span>
            <input
              class="popup__input popup__input_type_description"
              id="description"
              name="about"
              placeholder="Acerca de mí"
              type="text"
              minlength="2"
              maxlength="200"
              required
            />
            <span
              class="popup__error popup__error_type_description"
              id="description-error"
            ></span>

            <button
              class="popup__save-button popup__button popup__button_disabled"
              type="submit"
              disabled
            >Guardar
            </button>
          </form>
        </div>
      </div>
      <div class="popup" id="new-card-popup">
        <div class="popup__container">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close-button"
            type="button"
          ></button>
          <h3 class="popup__title">Nuevo lugar</h3>
          <form class="popup__form" id="new-card-form" novalidate>
            <input
              class="popup__input popup__input_type_card-name"
              type="text"
              id="place-name"
              name="name"
              placeholder="Título"
              minlength="2"
              maxlength="30"
              required
            />
            <input
              class="popup__input popup__input_type_card-link"
              id="place-link"
              name="link"
              placeholder="Enlace a la imagen"
              type="url"
              minlength="2"
              maxlength="30"
              required
            />
            <span
              class="popup__error" id="link-error"
            ></span>
            <button class="popup__save-button" type="submit">Crear</button>
           </form>
           </div>
           </div>
          // image-popup 
           <div class="popup" id="image-popup"></div>
           <div class="popup__container popup__container_type_image"></div>
           <button
           aria-label="Cerrar ventana emergente" 
           class="popup__close-button"
           type="button"           
           ></button> 
           <img class="popup__image" alt="" src="#"/>
           <p class = popup__caption></p>
           </div>
          </div>
          <!-- POPUP AVATAR -->
            <div class="popup" id="avatar-popup">
            <div class="popup__container">
              <button
              aria-label="AVATAR POPUP"
              class="popup__close-button"
              type="button"
              ></button>
              <h3 class="popup__title">Cambiar foto de perfil</h3>
              <form class="popup__form" name="avatar-form" id="avatar-form">
                <input
                id="avatar-url"
                class="popup__input popup__input_type_profile-avatar"
                name="avatar"
                placeholder="Enlace a la nueva foto"
                required
                type="url"
                />
                <!--<span class="popup__error" id="link-profile-error"></span> -->
                <button class="popup__save-button" type="submit">Guardar</button>
              </form> 
            </div>
            </div>
            // POPUP CONFIRMATION / ELIMINAR  
            <div class="popup" id="popup-delete">
            <div class="popup__container">
              <button
              aria-label="Cerrar ventana emergente"
              class="popup__close-button"
              type="button"
              ></button>
              <h3 class="popup__title">¿Estas seguro?</h3>
              <form class="popup__form" name="delete-form" id="delete-form">
                <button class="popup__save-button" type="submit">Sí</button>
              </form> 
            </div>
        </div>
    <script src="./index.js" type="module"></script>
  </body>
</html>
